short_bio_text_justify: false
short_bio: >-
  <p>
    A <a href="https://en.wikipedia.org/wiki/Cryptology_(album)" target="_blank">cryptographer</a> is a specific type of researcher who studies 
    how to secure communication from third parties, such as governments or future maintainers.
  </p>
  <p>
    Hello there! I am Mario, currently a researcher at the Cybersecurity Center of Fondazione Bruno Kessler. My work focuses on applied cryptography,
    spanning between implementations and practical comparisons. I am interested in a good variety of topics, mostly on the more pragmatic side, like how to build
    complete and sound systems, even if these days I often find myself studying zero-knowledge–related topics, a field which, ironically, requires 
    a lot of knowledge.
  </p>

