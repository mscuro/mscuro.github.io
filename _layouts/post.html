---
layout: default
---

<div class="row my-3">
    <div class="col-lg-8 offset-lg-2 col-md-10 offset-md-1">
        <div class="bg-white shadow-sm rounded-xl p-4">
            <h2 class="mb-1">{{ page.title }}</h2>
            <p class="text-muted small mb-3">
                <i class="fas fa-calendar-alt"></i> {{ page.date | date: "%B %d, %Y" }}
                {% if page.tags and page.tags.size > 0 %}
                &nbsp;&middot;&nbsp;
                {% for tag in page.tags %}<span class="badge badge-secondary">{{ tag }}</span> {% endfor %}
                {% endif %}
            </p>
            <hr>
            <div class="post-content">
                {{ content }}
            </div>
            <hr>
            <a href="{{ '/blog' | relative_url }}" class="text-muted small"><i class="fas fa-arrow-left"></i> Back to Blog</a>
        </div>
    </div>
</div>
